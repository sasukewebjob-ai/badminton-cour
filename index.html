<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🏸 バドミントン コート振り分け</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg: #0b1120;
            --surface: #111827;
            --surface2: #1c2840;
            --border: #2d3f5a;
            --accent: #10b981;
            --accent2: #059669;
            --male: #4f9ef8;
            --female: #f472b6;
            --guest: #fbbf24;
            --text: #e2e8f0;
            --muted: #6b8cae;
            --red: #f87171;
            --absent: #94a3b8;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Header ── */
        .header {
            background: linear-gradient(135deg, #0b1120, #1a2848, #0f2535);
            border-bottom: 1px solid var(--border);
            padding: 14px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 200;
            box-shadow: 0 4px 24px #00000088;
        }

        .logo {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        h1 {
            font-size: 18px;
            font-weight: 900;
            margin-left: 12px;
            background: linear-gradient(to right, #10b981, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hstats {
            display: flex;
            gap: 8px;
        }

        .badge {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 12px;
            color: var(--muted);
        }

        .badge b {
            color: var(--accent);
        }

        /* ── Layout ── */
        .app {
            display: flex;
            min-height: calc(100vh - 67px);
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 220px;
            min-width: 220px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .sb-head {
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
            background: var(--surface2);
            font-size: 12px;
            font-weight: 700;
            color: var(--muted);
            letter-spacing: .06em;
            text-transform: uppercase;
        }

        .sb-body {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .sec-label {
            font-size: 10px;
            color: var(--muted);
            font-weight: 700;
            letter-spacing: .08em;
            text-transform: uppercase;
            padding: 6px 2px 6px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .sec-label.male {
            color: var(--male);
        }

        .sec-label.female {
            color: var(--female);
        }

        .sec-label.guest {
            color: var(--guest);
        }

        .sec-label::before {
            content: '';
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: currentColor;
            flex-shrink: 0;
        }

        /* ── Chip ── */
        .chip {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 7px 9px;
            border-radius: 8px;
            margin-bottom: 4px;
            cursor: grab;
            user-select: none;
            border: 1px solid transparent;
            background: var(--surface2);
            transition: all .15s;
            touch-action: none;
            position: relative;
        }

        .chip.male {
            border-color: #4f9ef820;
        }

        .chip.female {
            border-color: #f472b620;
        }

        .chip.guest {
            border-color: #fbbf2420;
        }

        .chip:hover {
            transform: translateX(2px);
            border-color: var(--accent);
            background: #10b98114;
        }

        .chip.selected {
            border-color: var(--accent);
            background: #10b98120;
            box-shadow: 0 0 0 2px #10b98148;
        }

        .chip.dragging {
            opacity: .25;
        }

        .av {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .male .av {
            background: #4f9ef820;
            color: var(--male);
        }

        .female .av {
            background: #f472b620;
            color: var(--female);
        }

        .guest .av {
            background: #fbbf2420;
            color: var(--guest);
        }

        .cn {
            font-size: 13px;
            font-weight: 500;
            flex: 1;
        }

        .dh {
            color: var(--border);
            font-size: 13px;
        }

        /* ── Guest inputs ── */
        .g-section {
            border-top: 1px solid var(--border);
            padding: 12px;
            background: #fbbf2408;
        }

        .g-row {
            display: flex;
            align-items: center;
            gap: 7px;
            margin-bottom: 6px;
        }

        .g-toggle {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            border: 2px solid var(--guest);
            background: transparent;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .g-toggle.on {
            background: var(--guest);
        }

        .g-toggle.on::after {
            content: '✓';
            color: #000;
            font-size: 10px;
            font-weight: 900;
        }

        .g-inp {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 6px 8px;
            color: var(--text);
            font-size: 12px;
            font-family: inherit;
        }

        .g-inp:focus {
            outline: none;
            border-color: var(--guest);
        }

        .g-inp:disabled {
            opacity: .35;
        }

        /* ── Courts area ── */
        .courts-area {
            flex: 1;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            min-width: 0;
        }

        .ctrl {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        .pl {
            font-size: 11px;
            color: var(--muted);
            font-weight: 700;
        }

        .pbtn {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 5px 11px;
            color: var(--muted);
            font-size: 11px;
            cursor: pointer;
            transition: all .2s;
            font-family: inherit;
        }

        .pbtn:hover,
        .pbtn.on {
            border-color: var(--accent);
            color: var(--accent);
            background: #10b98112;
        }

        .sbtn {
            background: #6366f118;
            border: 1px solid #6366f140;
            border-radius: 6px;
            padding: 5px 11px;
            color: #818cf8;
            font-size: 11px;
            cursor: pointer;
            transition: all .2s;
            font-family: inherit;
        }

        .sbtn:hover {
            background: #6366f130;
        }

        .rbtn {
            margin-left: auto;
            background: #ef444418;
            border: 1px solid #ef444440;
            border-radius: 6px;
            padding: 5px 11px;
            color: var(--red);
            font-size: 11px;
            cursor: pointer;
            transition: all .2s;
            font-family: inherit;
        }

        .rbtn:hover {
            background: #ef444430;
        }

        /* ── Absent section ── */
        .absent-section {
            border-top: 1px solid var(--border);
            padding: 12px;
            background: #94a3b808;
        }

        .sec-label.absent {
            color: var(--absent);
        }

        .absent-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            min-height: 32px;
        }

        .absent-chips:empty::after {
            content: '欠席者はいません';
            font-size: 11px;
            color: var(--muted);
            display: flex;
            align-items: center;
            width: 100%;
            justify-content: center;
            padding: 6px;
        }

        .chip.absent-chip {
            border-color: #94a3b830;
            opacity: .65;
        }

        .chip.absent-chip .av {
            background: #94a3b820;
            color: var(--absent);
        }

        .abs-btn {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all .15s;
            margin-left: auto;
        }

        .abs-btn.to-absent {
            background: #94a3b820;
            color: var(--absent);
            opacity: 0;
        }

        .chip:hover .abs-btn.to-absent {
            opacity: 1;
        }

        .abs-btn.to-return {
            background: #10b98120;
            color: var(--accent);
        }

        .abs-btn:hover {
            transform: scale(1.2);
        }

        @media (hover: none) {
            .abs-btn.to-absent {
                opacity: 1;
            }
        }

        /* ── Courts grid ── */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            flex: 1;
        }

        /* ── Court card ── */
        .card {
            background: #0c1826;
            border: 2px solid var(--border);
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: border-color .2s;
            min-height: 260px;
        }

        .card.wide {
            grid-column: span 2;
            min-height: 280px;
        }

        .card.hover {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px #10b98130, inset 0 0 20px #10b98108;
        }

        .card.full {
            border-color: #ef444460;
        }

        .card-head {
            padding: 10px 14px;
            background: linear-gradient(135deg, var(--surface2), var(--surface));
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .cname {
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 14px;
            font-weight: 700;
            font-family: inherit;
            flex: 1;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: border-color .2s;
            padding: 2px 4px;
        }

        .cname:focus {
            outline: none;
            border-bottom-color: var(--accent);
            cursor: text;
        }

        .cnt {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .cnt.ok {
            background: #10b98120;
            color: var(--accent);
        }

        .cnt.full {
            background: #ef444420;
            color: var(--red);
        }

        .card-body {
            flex: 1;
            padding: 10px;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            gap: 5px;
            position: relative;
            min-height: 180px;
        }

        .drop-hint {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: var(--border);
            font-size: 11px;
            pointer-events: none;
        }

        .drop-hint div:first-child {
            font-size: 22px;
            margin-bottom: 4px;
        }

        /* ── Court member ── */
        .cmem {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 6px 9px;
            border-radius: 7px;
            background: var(--surface2);
            border: 1px solid var(--border);
            cursor: grab;
            touch-action: none;
            user-select: none;
            transition: all .15s;
            animation: fadeIn .2s ease;
        }

        .cmem:hover {
            border-color: var(--accent);
            background: #10b98112;
        }

        .cmem.male {
            border-left: 3px solid var(--male);
        }

        .cmem.female {
            border-left: 3px solid var(--female);
        }

        .cmem.guest {
            border-left: 3px solid var(--guest);
        }

        .cmem.dragging {
            opacity: .2;
        }

        .cmem.selected {
            border-color: var(--accent);
            background: #10b98120;
        }

        .delbtn {
            margin-left: auto;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #ef444420;
            color: var(--red);
            border: none;
            cursor: pointer;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity .15s;
            flex-shrink: 0;
        }

        .cmem:hover .delbtn {
            opacity: 1;
        }

        /* ── Pair ── */
        .pair-group {
            display: flex;
            align-items: stretch;
            gap: 0;
            border-radius: 10px;
            overflow: visible;
            animation: fadeIn .2s ease;
            position: relative;
            border: 2px solid transparent;
        }

        .pair-group .cmem {
            border-radius: 0;
            animation: none;
            border: none;
            border-left: none;
        }

        .pair-group .cmem:first-child {
            border-radius: 8px 0 0 8px;
        }

        .pair-group .cmem:last-child {
            border-radius: 0 8px 8px 0;
        }

        .pair-connector {
            width: 28px;
            min-width: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 900;
            color: #fff;
            flex-shrink: 0;
        }

        .unpair-btn {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #ef4444;
            color: #fff;
            border: 2px solid #0c1826;
            cursor: pointer;
            font-size: 10px;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            position: absolute;
            top: -8px;
            right: -8px;
            z-index: 10;
            opacity: 0;
            transition: opacity .15s;
            box-shadow: 0 2px 6px rgba(0, 0, 0, .4);
        }

        .pair-group:hover .unpair-btn {
            opacity: 1;
        }

        /* スマホではタッチしやすいよう常時表示 */
        @media (hover: none) {
            .unpair-btn {
                opacity: 1;
            }
        }

        /* ── Drag ghost ── */
        #ghost {
            position: fixed;
            z-index: 9999;
            pointer-events: none;
            display: none;
            background: var(--surface2);
            border: 2px solid var(--accent);
            border-radius: 8px;
            padding: 7px 14px;
            font-size: 13px;
            font-weight: 700;
            color: var(--text);
            white-space: nowrap;
            box-shadow: 0 8px 30px #00000080;
            transform: rotate(2deg);
            transition: transform .1s;
            min-width: 80px;
        }

        /* ── Toast ── */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--surface2);
            border: 1px solid var(--accent);
            border-radius: 10px;
            padding: 10px 16px;
            font-size: 13px;
            z-index: 9998;
            animation: fadeIn .3s;
            box-shadow: 0 4px 20px #00000060;
        }

        /* ── Pair hint ── */
        .pair-hint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            border: 1px solid #a78bfa;
            border-radius: 12px;
            padding: 10px 20px;
            font-size: 13px;
            font-weight: 700;
            z-index: 300;
            animation: fadeIn .3s;
            box-shadow: 0 4px 20px #00000060;
            white-space: nowrap;
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: var(--surface);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }

        /* ── Anims ── */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-6px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        /* ── Mobile ── */
        @media(max-width:768px) {
            .app {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                min-width: 0;
                border-right: none;
                border-bottom: 1px solid var(--border);
            }

            .sb-body {
                display: flex;
                flex-wrap: wrap;
                gap: 5px;
                max-height: 180px;
                padding: 8px;
            }

            .chip {
                margin-bottom: 0;
            }

            .courts-area {
                padding: 10px;
            }

            .grid {
                gap: 10px;
            }

            .card {
                min-height: 220px;
            }

            .card.wide {
                min-height: 240px;
            }

            h1 {
                font-size: 15px;
            }

            .hstats {
                display: none;
            }
        }

        @media(max-width:480px) {
            .grid {
                grid-template-columns: 1fr;
            }

            .card.wide {
                grid-column: span 1;
            }
        }
    </style>
</head>

<body>
    <div id="ghost"></div>

    <header class="header">
        <div style="display:flex;align-items:center;">
            <div class="logo">🏸</div>
            <h1>コート振り分け</h1>
        </div>
        <div class="hstats">
            <div class="badge">参加: <b id="totalC">0</b>名</div>
            <div class="badge">未割当: <b id="unassC">0</b>名</div>
        </div>
    </header>

    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sb-head">👥 メンバー一覧</div>
            <div class="sb-body" id="pool"></div>
            <!-- Absent section -->
            <div class="absent-section">
                <div class="sec-label absent" style="margin-bottom:8px;">🚫 欠席者</div>
                <div class="absent-chips" id="absentArea"></div>
            </div>
            <!-- Guest section -->
            <div class="g-section">
                <div class="sec-label guest" style="margin-bottom:8px;">🎟️ ゲスト参加者</div>
                <div id="guestArea"></div>
            </div>
        </aside>

        <!-- Courts -->
        <main class="courts-area">
            <div class="ctrl">
                <span class="pl">コート設定:</span>
                <button class="pbtn on" data-preset="0" onclick="applyPreset(0)">4コート</button>
                <button class="pbtn" data-preset="1" onclick="applyPreset(1)">2コート（12人）</button>
                <button class="pbtn" data-preset="2" onclick="applyPreset(2)">3コート（12人+6人×2）</button>
                <button class="pbtn" data-preset="3" onclick="applyPreset(3)">3コート（6人×2+12人）</button>
                <button class="sbtn" onclick="swapCourts()">🔃 上下入替</button>
                <button class="rbtn" onclick="resetAll()">🔄 リセット</button>
            </div>
            <div class="grid" id="grid"></div>
        </main>
    </div>

    <!-- Pair hint banner -->
    <div id="pairHint" class="pair-hint" style="display:none;"></div>

    <script>
        // ── DATA ──────────────────────────────────────────────
        const RAW = {
            male: ['大野真裕', '小笠原駿介', '唐澤祐治', '北原諒一', '越野純希', '小林直希',
                '高橋浩一', '原脩人', 'バレンティン', '根津仁志', '松武真平', '宮坂貴之', '宮澤輝樹', '渡辺大地'],
            female: ['朝日かのん', '内田妃奈', '春日胡桃', '黒河内恵美', '後藤優心',
                '下平瑠愛', '田中綾夏', '宮澤真帆', '宮下鈴', '依田怜実']
        };

        // Presets: each court {name, max, wide}
        const PRESETS = [
            // 0: 4コート (4 x 6)
            [{ name: 'コートA', max: 6, wide: false }, { name: 'コートB', max: 6, wide: false },
            { name: 'コートC', max: 6, wide: false }, { name: 'コートD', max: 6, wide: false }],
            // 1: 2コート (2 x 12)
            [{ name: 'コートA（2面）', max: 12, wide: true }, { name: 'コートB（2面）', max: 12, wide: true }],
            // 2: 3コート (12人 + 6人×2)
            [{ name: 'コートA（2面）', max: 12, wide: true },
            { name: 'コートB', max: 6, wide: false }, { name: 'コートC', max: 6, wide: false }],
            // 3: 3コート (6人×2 + 12人)
            [{ name: 'コートA', max: 6, wide: false }, { name: 'コートB', max: 6, wide: false },
            { name: 'コートC（2面）', max: 12, wide: true }],
        ];

        // ペアの背景色（はっきり区別できる6色）
        const PAIR_BG_COLORS = [
            { bg: 'rgba(245, 158, 11, 0.25)', border: '#f59e0b', connector: '#f59e0b' },  // オレンジ
            { bg: 'rgba(139, 92, 246, 0.25)', border: '#8b5cf6', connector: '#8b5cf6' },  // パープル
            { bg: 'rgba(6, 182, 212, 0.25)', border: '#06b6d4', connector: '#06b6d4' },  // シアン
            { bg: 'rgba(236, 72, 153, 0.25)', border: '#ec4899', connector: '#ec4899' },  // ピンク
            { bg: 'rgba(132, 204, 22, 0.25)', border: '#84cc16', connector: '#84cc16' },  // ライム
            { bg: 'rgba(249, 115, 22, 0.25)', border: '#f97316', connector: '#f97316' },  // ダークオレンジ
        ];

        // ── STATE ─────────────────────────────────────────────
        let people = [];
        let courts = [];   // {id, name, max, wide, pids:[], pairs:[[pidA,pidB],...]}
        let guests = [];
        let sel = null;     // selected person id for tap-assign
        let pairSel = null; // selected person id for pairing (within court)
        let currentPreset = 0;

        function initState() {
            let n = 1;
            people = [
                ...RAW.male.map(name => ({ id: 'm' + (n++), name, gender: 'male', courtId: null, absent: false })),
                ...RAW.female.map(name => ({ id: 'm' + (n++), name, gender: 'female', courtId: null, absent: false }))
            ];
            courts = PRESETS[0].map((p, i) => ({ id: 'c' + i, name: p.name, max: p.max, wide: p.wide, pids: [], pairs: [] }));
            guests = [1, 2, 3].map(i => ({ id: 'g' + i, name: '', enabled: false, courtId: null }));
        }

        function findPerson(id) { return people.find(p => p.id === id) || guests.find(g => g.id === id); }

        function assign(pid, courtId) {
            const p = findPerson(pid);
            if (!p) return false;
            // エラーチェック: 欠席者はコートに割り当て不可
            if (p.absent) {
                toast(`${p.name}は欠席者です。復帰してから割り当ててください。`);
                return false;
            }
            // エラーチェック: ゲストの名前が空
            if (guests.includes(p) && (!p.name || !p.name.trim())) {
                toast('ゲスト名を入力してください。');
                return false;
            }
            const court = courts.find(c => c.id === courtId);
            if (!court) return false;
            if (court.pids.length >= court.max) {
                toast(`${court.name}は満員です（最大${court.max}名）`);
                return false;
            }
            // Remove from old court (including pairs)
            removePidFromAllCourts(pid);
            p.courtId = courtId;
            court.pids.push(pid);
            return true;
        }

        function removePidFromAllCourts(pid) {
            courts.forEach(c => {
                c.pids = c.pids.filter(id => id !== pid);
                c.pairs = c.pairs.filter(pair => !pair.includes(pid));
            });
        }

        function removeFromCourt(pid) {
            removePidFromAllCourts(pid);
            const p = findPerson(pid);
            if (p) p.courtId = null;
            sel = null;
            clearPairSel();
            render();
        }

        function applyPreset(i) {
            currentPreset = i;
            [...people, ...guests].forEach(p => p.courtId = null);
            courts = PRESETS[i].map((p, j) => ({ id: 'c' + j, name: p.name, max: p.max, wide: p.wide, pids: [], pairs: [] }));
            document.querySelectorAll('.pbtn[data-preset]').forEach((b) => {
                b.classList.toggle('on', b.dataset.preset === String(i));
            });
            clearPairSel();
            render();
        }

        function resetAll() {
            [...people, ...guests].forEach(p => p.courtId = null);
            courts.forEach(c => { c.pids = []; c.pairs = []; });
            sel = null;
            clearPairSel();
            render();
        }

        // ── SWAP COURTS（全コート設定対応）──────────────────────
        function swapCourts() {
            // グリッドの行を判定（2カラムレイアウト）
            const rows = [];
            let currentRow = [];
            let colsUsed = 0;
            for (let i = 0; i < courts.length; i++) {
                const width = courts[i].wide ? 2 : 1;
                currentRow.push(i);
                colsUsed += width;
                if (colsUsed >= 2) {
                    rows.push(currentRow);
                    currentRow = [];
                    colsUsed = 0;
                }
            }
            if (currentRow.length > 0) rows.push(currentRow);

            if (rows.length < 2) {
                toast('入れ替えるコートがありません。');
                return;
            }

            // 上半分と下半分を判定
            const mid = Math.ceil(rows.length / 2);
            const topIndices = rows.slice(0, mid).flat();
            const bottomIndices = rows.slice(mid).flat();
            // 新しい順序: 下 → 上
            const newOrder = [...bottomIndices, ...topIndices];

            // 全コートデータを保存
            const savedData = courts.map(c => ({
                name: c.name, max: c.max, wide: c.wide,
                pids: [...c.pids], pairs: c.pairs.map(p => [...p])
            }));

            // 新しい順序でデータを適用
            newOrder.forEach((oldIdx, newIdx) => {
                const data = savedData[oldIdx];
                courts[newIdx].name = data.name;
                courts[newIdx].max = data.max;
                courts[newIdx].wide = data.wide;
                courts[newIdx].pids = data.pids;
                courts[newIdx].pairs = data.pairs;
                // courtIdを更新
                data.pids.forEach(pid => {
                    const p = findPerson(pid);
                    if (p) p.courtId = courts[newIdx].id;
                });
            });

            render();
            toast('上段と下段のコートを入れ替えました！');
        }

        // ── ABSENT ────────────────────────────────────────────────
        function markAbsent(pid) {
            const p = findPerson(pid);
            if (!p || guests.includes(p)) return;
            removePidFromAllCourts(pid);
            p.courtId = null;
            p.absent = true;
            sel = null;
            clearPairSel();
            render();
        }

        function markPresent(pid) {
            const p = findPerson(pid);
            if (!p) return;
            p.absent = false;
            render();
        }

        // ── PAIRING ───────────────────────────────────────────
        function makePair(courtId, pidA, pidB) {
            if (pidA === pidB) return;
            const court = courts.find(c => c.id === courtId);
            if (!court) return;
            // Check not already paired
            if (court.pairs.some(pair => pair.includes(pidA) || pair.includes(pidB))) {
                toast('すでにペアになっています。解除してからペアを組んでください。');
                return;
            }
            court.pairs.push([pidA, pidB]);
            clearPairSel();
            render();
        }

        function unpair(courtId, pairIndex) {
            const court = courts.find(c => c.id === courtId);
            if (!court) return;
            court.pairs.splice(pairIndex, 1);
            render();
        }

        function clearPairSel() {
            pairSel = null;
            document.getElementById('pairHint').style.display = 'none';
        }

        function getPairColorIdx(courtId, pairIdx) {
            return pairIdx % PAIR_BG_COLORS.length;
        }

        // ── RENDER ────────────────────────────────────────────
        function render() { renderPool(); renderAbsent(); renderCourts(); renderStats(); renderGuests(); }

        function renderStats() {
            const assigned = courts.reduce((s, c) => s + c.pids.length, 0);
            const total = people.length + guests.filter(g => g.enabled && g.name).length;
            document.getElementById('totalC').textContent = total;
            document.getElementById('unassC').textContent = Math.max(0, total - assigned);
        }

        function renderPool() {
            const el = document.getElementById('pool');
            el.innerHTML = '';
            const poolPeople = people.filter(p => !p.courtId && !p.absent);
            const poolGuests = guests.filter(g => g.enabled && g.name && !g.courtId);

            const malePool = poolPeople.filter(p => p.gender === 'male');
            const femalePool = poolPeople.filter(p => p.gender === 'female');

            if (malePool.length) {
                el.appendChild(mkLabel('male', '男性'));
                malePool.forEach(p => el.appendChild(mkChip(p)));
            }
            if (femalePool.length) {
                el.appendChild(mkLabel('female', '女性'));
                femalePool.forEach(p => el.appendChild(mkChip(p)));
            }
            if (poolGuests.length) {
                el.appendChild(mkLabel('guest', 'ゲスト'));
                poolGuests.forEach(g => el.appendChild(mkChip(g, 'guest')));
            }
        }

        function renderAbsent() {
            const el = document.getElementById('absentArea');
            el.innerHTML = '';
            const absentPeople = people.filter(p => p.absent);
            absentPeople.forEach(p => {
                const g = p.gender;
                const d = document.createElement('div');
                d.className = `chip absent-chip ${g}`;
                d.dataset.id = p.id;
                const returnBtn = `<button class="abs-btn to-return" title="復帰">↩</button>`;
                d.innerHTML = `<div class="av">${p.name.charAt(0)}</div><div class="cn">${p.name}</div>${returnBtn}`;
                d.querySelector('.abs-btn').addEventListener('click', e => {
                    e.stopPropagation();
                    markPresent(p.id);
                });
                el.appendChild(d);
            });
        }

        function mkLabel(cls, txt) {
            const d = document.createElement('div');
            d.className = 'sec-label ' + cls;
            d.textContent = txt;
            return d;
        }

        function mkChip(p, forceGender) {
            const g = forceGender || p.gender;
            const d = document.createElement('div');
            d.className = `chip ${g}`;
            d.dataset.id = p.id;
            if (sel === p.id) d.classList.add('selected');
            // 男性・女性のみ欠席ボタンを表示（ゲストは対象外）
            const absBtn = (!forceGender && (p.gender === 'male' || p.gender === 'female'))
                ? `<button class="abs-btn to-absent" title="欠席">✕</button>`
                : '';
            d.innerHTML = `<div class="av">${p.name.charAt(0)}</div><div class="cn">${p.name}</div>${absBtn}<div class="dh">⠿</div>`;
            const absBtnEl = d.querySelector('.abs-btn');
            if (absBtnEl) {
                absBtnEl.addEventListener('click', e => {
                    e.stopPropagation();
                    markAbsent(p.id);
                });
            }
            d.addEventListener('click', () => onPoolClick(p.id));
            setupDrag(d, p.id);
            return d;
        }

        function renderGuests() {
            const el = document.getElementById('guestArea');
            el.innerHTML = '';
            guests.forEach((g, i) => {
                const row = document.createElement('div');
                row.className = 'g-row';
                const tog = document.createElement('div');
                tog.className = 'g-toggle' + (g.enabled ? ' on' : '');
                tog.addEventListener('click', () => toggleGuest(i));
                const inp = document.createElement('input');
                inp.type = 'text'; inp.className = 'g-inp';
                inp.placeholder = `ゲスト${i + 1}の名前`;
                inp.value = g.name; inp.disabled = !g.enabled;
                inp.addEventListener('input', e => { guests[i].name = e.target.value; renderStats(); });
                inp.addEventListener('change', () => { if (g.courtId) render(); });
                row.appendChild(tog); row.appendChild(inp);
                el.appendChild(row);
            });
        }

        function toggleGuest(i) {
            const g = guests[i];
            g.enabled = !g.enabled;
            if (!g.enabled) {
                removePidFromAllCourts(g.id);
                g.courtId = null;
            }
            render();
        }

        function renderCourts() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            courts.forEach((c, i) => {
                const card = document.createElement('div');
                const full = c.pids.length >= c.max;
                card.className = 'card' + (full ? ' full' : '') + (c.wide ? ' wide' : '');
                card.dataset.cid = c.id;

                // Header
                const head = document.createElement('div');
                head.className = 'card-head';
                const nameEl = document.createElement('input');
                nameEl.type = 'text'; nameEl.className = 'cname'; nameEl.value = c.name;
                nameEl.addEventListener('change', e => { courts[i].name = e.target.value; });

                const maxLabel = document.createElement('span');
                maxLabel.style.cssText = 'font-size:10px;color:var(--muted);margin-right:4px;';
                maxLabel.textContent = c.wide ? '(2面)' : '(1面)';

                const cntEl = document.createElement('div');
                cntEl.className = 'cnt ' + (full ? 'full' : 'ok');
                cntEl.textContent = `${c.pids.length}/${c.max}`;
                head.appendChild(nameEl); head.appendChild(maxLabel); head.appendChild(cntEl);

                // Body
                const body = document.createElement('div');
                body.className = 'card-body';
                body.dataset.cid = c.id;
                if (c.pids.length === 0) {
                    body.innerHTML = `<div class="drop-hint"><div>🏸</div><div>ここにドロップ</div></div>`;
                }

                // Build: paired people first, then unpaired
                const pairedPids = new Set();
                c.pairs.forEach((pair, pairIdx) => {
                    pair.forEach(pid => pairedPids.add(pid));
                    const pA = findPerson(pair[0]);
                    const pB = findPerson(pair[1]);
                    if (pA && pB) {
                        body.appendChild(mkPairGroup(pA, pB, c.id, pairIdx));
                    }
                });
                c.pids.filter(pid => !pairedPids.has(pid)).forEach(pid => {
                    const p = findPerson(pid);
                    if (p) body.appendChild(mkCourtMem(p, c.id));
                });

                body.addEventListener('click', e => onCourtClick(c.id, e));

                card.appendChild(head);
                card.appendChild(body);
                grid.appendChild(card);
            });
        }

        function mkCourtMem(p, courtId) {
            const g = p.gender || 'guest';
            const d = document.createElement('div');
            d.className = `cmem ${g}`;
            d.dataset.id = p.id;
            if (sel === p.id) d.classList.add('selected');
            if (pairSel === p.id) d.classList.add('selected');
            d.innerHTML = `<div class="av">${p.name.charAt(0)}</div><div class="cn">${p.name}</div><button class="delbtn">✕</button>`;
            d.querySelector('.delbtn').addEventListener('click', e => { e.stopPropagation(); removeFromCourt(p.id); });
            d.addEventListener('click', e => {
                if (!e.target.classList.contains('delbtn')) onCourtMemClick(p.id, courtId);
            });
            setupDrag(d, p.id, courtId);
            return d;
        }

        function mkPairGroup(pA, pB, courtId, pairIdx) {
            const colorIdx = getPairColorIdx(courtId, pairIdx);
            const pairColor = PAIR_BG_COLORS[colorIdx];
            const wrapper = document.createElement('div');
            wrapper.className = 'pair-group';
            wrapper.style.borderColor = pairColor.border;

            const elA = mkCourtMem(pA, courtId);
            elA.style.flex = '1';
            elA.style.background = pairColor.bg;

            const conn = document.createElement('div');
            conn.className = 'pair-connector';
            conn.style.background = pairColor.connector;
            conn.textContent = '↔';

            const elB = mkCourtMem(pB, courtId);
            elB.style.flex = '1';
            elB.style.background = pairColor.bg;

            const unpairBtn = document.createElement('button');
            unpairBtn.className = 'unpair-btn';
            unpairBtn.textContent = '✕';
            unpairBtn.addEventListener('click', e => {
                e.stopPropagation();
                e.preventDefault();
                unpair(courtId, pairIdx);
            });
            unpairBtn.addEventListener('pointerdown', e => {
                e.stopPropagation(); // ドラッグ開始を防止
            });

            wrapper.appendChild(elA);
            wrapper.appendChild(conn);
            wrapper.appendChild(elB);
            wrapper.appendChild(unpairBtn);
            return wrapper;
        }

        // ── TAP INTERACTIONS ──────────────────────────────────
        function onPoolClick(pid) {
            clearPairSel();
            sel = sel === pid ? null : pid;
            refreshSelection();
        }

        function onCourtClick(courtId, e) {
            if (e.target.closest('.cmem') || e.target.closest('.pair-group')) return;
            if (sel && !courts.find(c => c.id === courtId)?.pids.includes(sel)) {
                if (assign(sel, courtId)) { sel = null; render(); }
            }
        }

        function onCourtMemClick(pid, courtId) {
            // If we have a pool selection, assign to this court
            if (sel && sel !== pid && !courts.find(c => c.id === courtId)?.pids.includes(sel)) {
                if (assign(sel, courtId)) { sel = null; render(); return; }
            }
            sel = null;

            // Pair mode: if same court, pair them
            const court = courts.find(c => c.id === courtId);
            if (!court) return;
            if (!court.pids.includes(pid)) return;

            // Already in a pair? skip
            if (court.pairs.some(pair => pair.includes(pid))) {
                clearPairSel();
                refreshSelection();
                return;
            }

            if (pairSel && pairSel !== pid) {
                // Check pairSel is in same court
                if (court.pids.includes(pairSel) && !court.pairs.some(pair => pair.includes(pairSel))) {
                    makePair(courtId, pairSel, pid);
                    return;
                }
            }
            // Toggle pair selection
            if (pairSel === pid) {
                clearPairSel();
            } else {
                pairSel = pid;
                const p = findPerson(pid);
                const hint = document.getElementById('pairHint');
                hint.textContent = `🤝 ${p ? p.name : ''} のペア相手をタップしてください`;
                hint.style.display = 'block';
            }
            refreshSelection();
        }

        function refreshSelection() {
            document.querySelectorAll('[data-id]').forEach(el => {
                const isSelected = el.dataset.id === sel || el.dataset.id === pairSel;
                el.classList.toggle('selected', isSelected);
            });
        }

        // ── DRAG & DROP (Pointer Events) ───────────────────────
        let drag = { pid: null, fromCourt: null, active: false, startX: 0, startY: 0 };
        const ghost = document.getElementById('ghost');

        function setupDrag(el, pid, fromCourt) {
            el.addEventListener('pointerdown', e => {
                if (e.target.closest('.delbtn') || e.target.closest('.cname') ||
                    e.target.closest('.g-toggle') || e.target.closest('.g-inp') ||
                    e.target.closest('.unpair-btn') || e.target.closest('.abs-btn')) return;
                drag = { pid, fromCourt: fromCourt || null, active: false, startX: e.clientX, startY: e.clientY };
            }, { passive: true });
        }

        document.addEventListener('pointermove', e => {
            if (!drag.pid) return;
            const dx = e.clientX - drag.startX, dy = e.clientY - drag.startY;
            if (!drag.active && Math.sqrt(dx * dx + dy * dy) > 8) {
                drag.active = true;
                const p = findPerson(drag.pid);
                if (p) { ghost.textContent = '🏸 ' + p.name; ghost.style.display = 'block'; }
                const src = document.querySelector(`[data-id="${drag.pid}"]`);
                if (src) src.classList.add('dragging');
            }
            if (!drag.active) return;
            ghost.style.left = (e.clientX - 40) + 'px';
            ghost.style.top = (e.clientY - 24) + 'px';

            ghost.style.display = 'none';
            const under = document.elementFromPoint(e.clientX, e.clientY);
            ghost.style.display = 'block';
            document.querySelectorAll('.card').forEach(c => c.classList.remove('hover'));
            const cc = under?.closest('.card');
            if (cc && !cc.classList.contains('full')) cc.classList.add('hover');
        }, { passive: true });

        document.addEventListener('pointerup', e => {
            if (!drag.pid) return;
            if (drag.active) {
                ghost.style.display = 'none';
                document.querySelectorAll('.card').forEach(c => c.classList.remove('hover'));
                const under = document.elementFromPoint(e.clientX, e.clientY);
                const cc = under?.closest('.card');

                // Check if dropped on another court member (for pairing)
                const targetMem = under?.closest('.cmem');
                if (targetMem && drag.fromCourt) {
                    const targetPid = targetMem.dataset.id;
                    const court = courts.find(c => c.id === drag.fromCourt);
                    if (court && targetPid !== drag.pid &&
                        court.pids.includes(targetPid) && court.pids.includes(drag.pid) &&
                        !court.pairs.some(p => p.includes(drag.pid)) &&
                        !court.pairs.some(p => p.includes(targetPid))) {
                        makePair(drag.fromCourt, drag.pid, targetPid);
                        document.querySelectorAll('.dragging').forEach(el => el.classList.remove('dragging'));
                        drag.pid = null;
                        drag.active = false;
                        return;
                    }
                }

                if (cc) {
                    const toId = cc.dataset.cid;
                    if (toId && toId !== drag.fromCourt) {
                        if (drag.fromCourt) {
                            removePidFromAllCourts(drag.pid);
                            const p = findPerson(drag.pid);
                            if (p) p.courtId = null;
                        }
                        assign(drag.pid, toId);
                        render();
                    }
                }
                document.querySelectorAll('.dragging').forEach(el => el.classList.remove('dragging'));
            }
            drag.pid = null;
            drag.active = false;
        });

        document.addEventListener('pointercancel', () => {
            ghost.style.display = 'none';
            document.querySelectorAll('.card').forEach(c => c.classList.remove('hover'));
            document.querySelectorAll('.dragging').forEach(el => el.classList.remove('dragging'));
            drag.pid = null; drag.active = false;
        });

        // ── TOAST ──────────────────────────────────────────────
        function toast(msg) {
            const t = document.createElement('div');
            t.className = 'toast'; t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        // ── START ──────────────────────────────────────────────
        initState();
        render();
    </script>
</body>

</html>
